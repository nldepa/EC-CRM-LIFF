  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"
    onerror="window.liffLoadError = true;"></script>
  <!-- Main Application Logic -->
  <script defer src="app.js"></script>
</head>

<body>

  <div class="background-glow-2"></div>

      <!-- LINE Profile Section (Hidden from UI) -->
      <!--

          <img id="user_avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a1a1aa'><path d='M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z'/></svg>" alt="LINE 暱稱">

      <form id="bind_form" novalidate>
        <!-- Hidden Inputs for LIFF and UTM Info -->
        <input type="hidden" id="line_uid" name="line_uid">
        <input type="hidden" id="line_display_name" name="line_display_name">
        <input type="hidden" id="utm_source" name="utm_source">
        <input type="hidden" id="utm_medium" name="utm_medium">


        <!-- Customer Email Field -->
        <div class="form-group">
          <label for="email">電子郵件 <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email">
          </div>
          <span class="error-msg" id="email_error">請輸入正確的電子郵件格式</span>
        </div>

        <!-- UTM Param Info (Readonly for visual assurance) -->
        <div class="utm-tags" id="utm_tags_container" style="display: none;">
          <div class="utm-tag" id="tag_source">Source: -</div>
          <div class="utm-tag" id="tag_medium">Medium: -</div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit_btn" class="submit-btn" disabled>
          <span class="btn-text">確認送出並綁定</span>
          <span class="spinner" style="display: none;"></span>
        </button>
      </form>
    </div>

    <!-- Success Feedback Container -->
    <div class="card success-card" id="success_card" style="display: none;">
      <div class="success-icon-container">
        <div class="success-circle">
          <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
      </div>
      <h2>綁定成功！</h2>
      <p>您的 LINE 帳號已成功與會員系統綁定。</p>
      <div class="redirect-info">
        <p class="redirect-countdown">系統即將在 <span id="countdown_sec">3</span> 秒後引導您前往 LINE 官方帳號...</p>
        <p class="redirect-hint">若頁面沒有自動跳轉，請點擊下方按鈕：</p>
        <a id="manual_redirect_link" href="https://line.me/R/ti/p/@252egmyd" class="redirect-btn">前往 LINE 官方帳號</a>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>
